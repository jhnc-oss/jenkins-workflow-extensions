name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: "release hpi"
    steps:
      - name: Build
        uses: offa/maven-action@c667d622234c5df724ba5bdfd4130f8b1c293f2d
        with:
          java-version: 21
          pmd: false
      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/*.hpi
