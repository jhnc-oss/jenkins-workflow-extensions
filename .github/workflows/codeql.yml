name: codeql

on:
  schedule:
    - cron: '0 5 * * 3'
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    name: "CodeQL"
    steps:
      - name: Build
        uses: offa/maven-action@6ae95407e3764dbe8a6402cc485cb46702320fe0
        with:
          java-version: 21
      - name: CodeQL Initialization
        uses: github/codeql-action/init@v4
        with:
          languages: java, actions
          queries: +security-and-quality
          build-mode: none
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4
